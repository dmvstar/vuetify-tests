<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vuetify 3 API Post</title>
    <link
      href="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <v-app>
        <v-main>
          <v-container class="fill-height" fluid>
            <v-row justify="center">
              <v-col cols="12" sm="8" md="4">
                <v-card class="pa-5" elevation="8">
                  <v-card-title class="text-h5 mb-4"
                    >Report Definition</v-card-title
                  >

                  <v-card-text>
                    <v-select
                      v-model="selectedMonth"
                      :items="months"
                      label="Month"
                      prepend-inner-icon="mdi-calendar-month"
                      variant="outlined"
                      class="mb-4"
                    ></v-select>

                    <v-select
                      v-model="selectedYear"
                      :items="years"
                      label="Year"
                      prepend-inner-icon="mdi-calendar-range"
                      variant="outlined"
                    ></v-select>
                  </v-card-text>

                  <v-card-actions>
                    <v-spacer></v-spacer>
                    <v-btn
                      color="primary"
                      variant="elevated"
                      :loading="loading"
                      @click="submitData"
                      block
                    >
                      Generate Report {{ selectedMonth }} {{ selectedYear }}
                    </v-btn>
                  </v-card-actions>

                  <v-alert
                    v-if="responseMsg"
                    :type="responseStatus"
                    class="mt-4"
                    closable
                  >
                    {{ responseMsg }}
                  </v-alert>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </v-main>
      </v-app>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
            const { createApp, ref } = Vue;
            const { createVuetify } = Vuetify;

            const vuetify = createVuetify({
              theme: { defaultTheme: "dark" },
            });

            const app = createApp({
              setup() {
                const months = [
                  "January",
                  "February",
                  "March",
                  "April",
                  "May",
                  "June",
                  "July",
                  "August",
                  "September",
                  "October",
                  "November",
                  "December",
                ];
                const years = Array.from({ length: 11 }, (v, i) => 2020 + i);

                const currentDate = new Date();
                const selectedMonth = ref(months[currentDate.getMonth()]);
                const selectedYear = ref(currentDate.getFullYear());

                // UI State
                const loading = ref(false);
                const responseMsg = ref("");
                const responseStatus = ref("success");

                  let host = "http://localhost:1880/";
                  let path = "api/v1/aswp/reports/account/definition";
                  let fullUrl = host + path;


                /*
                const gotoLink​() {
      ​             window​.​open​(​'https://workingunittests.com'​, ​'​_blank​'​);
                };
                */

                const submitData = async () => {
                  window.open(fullUrl, "_blank");                  
                };

                const submitData0 = async () => {
                  loading.value = true;
                  responseMsg.value = "";

                  const payload = {
                    month: selectedMonth.value,
                    year: selectedYear.value,
                  };
                  /*
                try {
                  const response = await axios.post(fullUrl, payload);
                  responseStatus.value = 'success';
                  responseMsg.value = 'Report requested successfully!';
                  console.log('Success:', response.data);
                } catch (error) {
                  responseStatus.value = 'error';
                  responseMsg.value = error.response?.data?.message || 'Error connecting to the server ' + fullUrl;
                  console.error('API Error:', error);
                } finally {
                  loading.value = false;
                }
                */
                  try {
                    const response = await fetch(fullUrl, {
                      method: "GET",
                      // mode: "cors", // Explicitly setting CORS mode
                      headers: {
                        "Content-Type": "application/json",
                      },
                      //, body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                      // Handle non-200 responses
                      const errorData = await response.json().catch(() => ({}));
                      throw new Error(
                        errorData.message || `Server error: ${response.status}`,
                      );
                    }

                    const data = await response.text();

                    // --- NEW CODE STARTS HERE ---
                    // 1. Create a Blob from the HTML string
                    const blob = new Blob([data], { type: "text/html",
                      name: "Report.html"
                     });

                    // 2. Create a temporary URL for the Blob
                    const url = URL.createObjectURL(blob);

                    // 3. Open the URL in a new tab
                    window.open(url, "_blank");

                    // 4. (Optional) Cleanup the URL memory after a short delay
                    setTimeout(() => URL.revokeObjectURL(url), 10000);
                    // --- NEW CODE ENDS HERE ---

                    responseStatus.value = "success";
                    responseMsg.value = "Report requested successfully!";
                    console.log("Success:", data);
                  } catch (error) {
                    responseStatus.value = "error";
                    // Custom message for CORS issues
                    if (error.message.includes("Failed to fetch")) {
                      responseMsg.value =
                        "CORS Error: The server at localhost blocked the request. Check API headers.";
                    } else {
                      responseMsg.value = error.message;
                    }
                    console.error("Fetch Error:", error);
                  } finally {
                    loading.value = false;
                  }
                };

                return {
                  months,
                  years,
                  selectedMonth,
                  selectedYear,
                  loading,
                  submitData,
                  responseMsg,
                  responseStatus,
                };
              },
            });

            app.use(vuetify).mount("#app");
    </script>
  </body>
</html>
