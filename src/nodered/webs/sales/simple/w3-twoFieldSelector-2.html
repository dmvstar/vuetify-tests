<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vuetify 3 API Post</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/svg/book-open-variant.svg" type="image/svg+xml">
    
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet" />
    
    <style>
      /* Background Image Setup */
      .v-main {
        background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                    url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&q=80&w=2000');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }
      
      /* Subtle blur effect for the card to pop against the books */
      .glass-card {
        background: rgba(30, 30, 30, 0.85) !important;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <v-app>
        <v-main>
          <v-container class="fill-height" fluid>
            <v-row justify="center">
              <v-col cols="12" sm="8" md="4">
                <v-card class="pa-5 glass-card" elevation="24">
                  <v-card-title class="text-h5 mb-4 d-flex align-center">
                    <v-icon icon="mdi-book-open-page-variant" color="primary" class="me-3"></v-icon>
                    Report Definition
                  </v-card-title>

                  <v-card-text>
                    <v-select
                      v-model="selectedMonth"
                      :items="months"
                      label="Month"
                      prepend-inner-icon="mdi-calendar-month"
                      variant="outlined"
                      class="mb-4"
                    ></v-select>

                    <v-select
                      v-model="selectedYear"
                      :items="years"
                      label="Year"
                      prepend-inner-icon="mdi-calendar-range"
                      variant="outlined"
                    ></v-select>
                  </v-card-text>

                  <v-card-actions>
                    <v-spacer></v-spacer>
                    <v-btn
                      color="primary"
                      variant="elevated"
                      :loading="loading"
                      @click="submitData"
                      block
                      size="large"
                      :prepend-icon="loading ? '' : 'mdi-file-find'"
                    >
                      Generate Report
                    </v-btn>
                  </v-card-actions>

                  <v-alert
                    v-if="responseMsg"
                    :type="responseStatus"
                    class="mt-4"
                    closable
                  >
                    {{ responseMsg }}
                  </v-alert>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </v-main>
      </v-app>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
      const { createApp, ref } = Vue;
      const { createVuetify } = Vuetify;

      const vuetify = createVuetify({
        theme: { defaultTheme: "dark" },
      });

      const app = createApp({
        setup() {
          const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
          const years = Array.from({ length: 11 }, (v, i) => 2020 + i);

          const currentDate = new Date();
          const selectedMonth = ref(months[currentDate.getMonth()]);
          const selectedYear = ref(currentDate.getFullYear());

          const loading = ref(false);
          const responseMsg = ref("");
          const responseStatus = ref("success");

          let host = "http://localhost:1880/";
          let path = "api/v1/aswp/reports/account/definition";
          let fullUrl = host + path;

          // Combined Logic: Open in new tab and handle as HTML
          const submitData = async () => {
            loading.value = true;
            try {
              // Appending query params so Node-RED knows which month/year to generate
              const urlWithParams = `${fullUrl}?month=${selectedMonth.value}&year=${selectedYear.value}`;
              
              // We use window.open directly. 
              // Note: Ensure Node-RED sends 'Content-Type: text/html' and 'Content-Disposition: inline'
              window.open(urlWithParams, "_blank");
              
              responseStatus.value = "success";
              responseMsg.value = "Report tab opened.";
            } catch (error) {
              responseStatus.value = "error";
              responseMsg.value = "Failed to open report.";
            } finally {
              loading.value = false;
            }
          };

          return {
            months,
            years,
            selectedMonth,
            selectedYear,
            loading,
            submitData,
            responseMsg,
            responseStatus,
          };
        },
      });

      app.use(vuetify).mount("#app");
    </script>
  </body>
</html>
