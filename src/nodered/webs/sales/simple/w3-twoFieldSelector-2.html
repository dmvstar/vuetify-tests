<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vuetify 3 ACCS Report</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/svg/book-open-variant.svg" type="image/svg+xml" />

    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet" />

    <style>
      .v-main {
        background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
          url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&q=80&w=2000");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }

      .glass-card {
        background: rgba(33, 33, 33, 0.9) !important;
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .debug-section {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 10px;
        margin-top: 20px;
        transition: all 0.3s ease;
      }

      .debug-text {
        font-family: 'Fira Code', monospace;
        color: #80cbc4;
        font-size: 0.75rem;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <v-app>
        <v-main>
          <v-container class="fill-height" fluid>
            <v-row justify="center" align="center" style="flex-direction: column;">
              
              <v-col cols="12" sm="8" md="4">
                <v-card class="pa-5 glass-card" elevation="24">
                  <v-card-title class="text-h5 mb-4 d-flex align-center text-white">
                    <v-icon icon="mdi-book-open-page-variant" color="primary" class="me-3"></v-icon>
                    Report Definition
                  </v-card-title>

                  <v-card-text>
                    <v-select
                      v-model="selectedMonth"
                      :items="months"
                      label="Select Month"
                      prepend-inner-icon="mdi-calendar-month"
                      variant="outlined"
                      class="mb-4"
                    ></v-select>

                    <v-select
                      v-model="selectedYear"
                      :items="years"
                      label="Select Year"
                      prepend-inner-icon="mdi-calendar-range"
                      variant="outlined"
                    ></v-select>
                  </v-card-text>

                  <v-card-actions>
                    <v-spacer></v-spacer>
                    <v-btn
                      color="primary"
                      variant="elevated"
                      :loading="loading"
                      @click="submitData"
                      block
                      size="large"
                      prepend-icon="mdi-file-find"
                    >
                      Generate Report
                    </v-btn>
                  </v-card-actions>

                  <v-alert v-if="responseMsg" :type="responseStatus" class="mt-4" closable>
                    {{ responseMsg }}
                  </v-alert>
                </v-card>
              </v-col>

              <v-col cols="12" sm="8" md="6">
                <v-row justify="center" class="mt-2">
                  <v-col cols="auto" class="debug-section text-center">
                    <div class="mb-2">
                      <v-chip size="small" variant="flat" color="indigo-darken-3" class="ma-1">
                        <v-icon start icon="mdi-calendar-check"></v-icon>
                        Year: {{selectedYear}}
                      </v-chip>
                      <v-chip size="small" variant="flat" color="teal-darken-3" class="ma-1">
                        <v-icon start icon="mdi-clock-outline"></v-icon>
                        Month: {{selectedMonth}}
                      </v-chip>
                    </div>
                    <div class="debug-text">
                      <v-icon size="small" icon="mdi-link-variant" class="me-1"></v-icon>
                      Target URL: {{fullUrl}}?repoDate={{selectedYear}}-{{selectedMonth.split('-')[0]}}
                    </div>
                  </v-col>
                </v-row>
              </v-col>

            </v-row>
          </v-container>
        </v-main>
      </v-app>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.js"></script>

    <script>
      const { createApp, ref, computed } = Vue;
      const { createVuetify } = Vuetify;

      const vuetify = createVuetify({
        theme: { defaultTheme: "dark" },
      });

      const app = createApp({
        setup() {
          const months = [
            "01-January", "02-February", "03-March", "04-April", 
            "05-May", "06-June", "07-July", "08-August", 
            "09-September", "10-October", "11-November", "12-December"
          ];
          const years = Array.from({ length: 11 }, (v, i) => 2020 + i);

          const currentDate = new Date();
          const selectedMonth = ref(months[currentDate.getMonth()]);
          const selectedYear = ref(currentDate.getFullYear());

          const loading = ref(false);
          const responseMsg = ref("");
          const responseStatus = ref("success");

          const hostInfo = ref({
            host: "http://localhost:1880",
            path: "/api/v1/aswp/reports/account/definition"
          });

          const fullUrl = computed(() => {
            const base = hostInfo.value.host.endsWith('/') ? hostInfo.value.host : hostInfo.value.host + '/';
            const route = hostInfo.value.path.startsWith('/') ? hostInfo.value.path.substring(1) : hostInfo.value.path;
            return base + route;
          });

          return {
            months, years, selectedMonth, selectedYear,
            loading, responseMsg, responseStatus,
            hostInfo, fullUrl
          };
        },

        mounted() {
          if (document.URL.includes("http")) {
            const currentUrl = new URL(document.URL);
            this.hostInfo.host = `${currentUrl.protocol}//${currentUrl.host}`;
          }
        },

        methods: {
          async submitData() {
            this.loading = true;
            try {
              const monthPart = this.selectedMonth.split("-")[0];
              const finalEndpoint = `${this.fullUrl}?repoDate=${this.selectedYear}-${monthPart}`;
              window.open(finalEndpoint, "_blank");
              this.responseStatus = "success";
              this.responseMsg = "Request dispatched.";
            } catch (error) {
              this.responseStatus = "error";
              this.responseMsg = "Error opening report.";
            } finally {
              this.loading = false;
            }
          }
        }
      });

      app.use(vuetify).mount("#app");
    </script>
  </body>
</html>
