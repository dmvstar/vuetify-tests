<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Vuetify Dialog - Grid Logic</title>

  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
</head>

<body>
  <div id="app">
    <v-app v-if="isReady">
      <v-main class="bg-grey-lighten-4">
        <v-container class="mt-10">

          <v-card class="mx-auto pa-6" max-width="600">
            <v-card-title class="text-h5 mb-4">Current Data State</v-card-title>

            <v-table v-if="originalData && originalData.length" density="compact">
              <thead>
                <tr>
                  <th class="text-left">Field Name</th>
                  <th class="text-left">Type</th>
                  <th class="text-left">Value</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(item, index) in originalData" :key="index">
                  <td><strong>{{ item?.name }}</strong></td>
                  <td><v-chip size="x-small">{{ item?.type }}</v-chip></td>
                  <td>{{ item?.value }}</td>
                </tr>
              </tbody>
            </v-table>

            <v-card-actions class="mt-4">
              <v-btn color="primary" variant="elevated" prepend-icon="mdi-pencil" @click="openDialog">
                Edit Data (Sorted Grid)
              </v-btn>
            </v-card-actions>
          </v-card>

          <v-dialog v-model="dialog" max-width="700px" persistent>
            <v-card v-if="dialog">
              <v-card-title class="bg-primary text-white">
                <v-icon start>mdi-form-select</v-icon>
                Dynamic Form Editor
              </v-card-title>

              <v-card-text class="pt-6">
                <v-form>
                  <v-row dense>
                    <v-col v-for="(field, index) in sortedEditableFields" :key="'edit-'+index"
                      :cols="field.type === 'text' ? 12 : 6">
                      
                      <v-textarea v-if="field.type === 'text'" v-model="field.value" :label="field.name.toUpperCase()"
                        variant="outlined" rows="2" auto-grow hide-details="auto" class="mb-2"></v-textarea>

                      <v-text-field v-else v-model="field.value" :label="field.name.toUpperCase()" variant="outlined"
                        :disabled="field.name === 'id'" hide-details="auto" class="mb-2"
                        :type="field.type === 'int' ? 'number' : 'text'"></v-text-field>
                    </v-col>
                  </v-row>
                </v-form>
              </v-card-text>

              <v-divider></v-divider>

              <v-card-actions class="pa-4">
                <v-spacer></v-spacer>
                <v-btn variant="text" color="error" @click="dialog = false">Cancel</v-btn>
                <v-btn variant="elevated" color="success" @click="saveChanges">Save Changes</v-btn>
              </v-card-actions>
            </v-card>
          </v-dialog>

        </v-container>
      </v-main>
    </v-app>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.2/dist/vuetify.min.js"></script>

  <script>
    const { createApp, ref, onMounted, computed } = Vue;
    const { createVuetify } = Vuetify;

    const vuetify = createVuetify();

    const app = createApp({
      setup() {
        const isReady = ref(false);
        const dialog = ref(false);

        const originalData = ref([
          { name: "id", value: 1, type: "int" },
          { name: "code", value: "ARC", type: "varchar(32)" },
          { name: "info", value: "Archive data", type: "text" },
          { name: "api", value: "/api/v1/test/api", type: "varchar(32)" },
          { name: "url", value: "www.google.com", type: "text" },
          { name: "ver", value: "1.0", type: "varchar(10)" },
          { name: "date", value: "2026-03-15", type: "varchar(10)" },
          { name: "count", value: 5, type: "int" }
        ]);

        const editableFields = ref([]);

        // TWOJE ALGORYTM: Sortowanie pól w dialogu
        const sortedEditableFields = computed(() => {
          if (!editableFields.value.length) return [];

          // Rozdzielamy na szerokie (12 cols) i wąskie (6 cols)
          const fullWidth = editableFields.value.filter(f => f.type === 'text');
          const halfWidth = editableFields.value.filter(f => f.type !== 'text');

          // Najpierw małe pola (żeby wypełniały wiersze parzyście), potem duże
          return [...halfWidth, ...fullWidth];
        });

        const openDialog = () => {
          // Kopiujemy dane do edycji
          editableFields.value = JSON.parse(JSON.stringify(originalData.value));
          dialog.value = true;
        };

        const saveChanges = () => {
          // Przy zapisie musimy zachować oryginale dane, 
          // ale zaktualizowane o wartości z editableFields
          originalData.value = JSON.parse(JSON.stringify(editableFields.value));
          dialog.value = false;
        };

        onMounted(() => {
          isReady.value = true;
        });

        return {
          isReady,
          dialog,
          originalData,
          editableFields,
          sortedEditableFields, // Udostępniamy posortowane pole
          openDialog,
          saveChanges
        }
      }
    });

    app.use(vuetify).mount('#app');
  </script>
</body>
</html>
